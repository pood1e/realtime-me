name: realtime-me-status

services:
  status-gateway:
    build:
      context: ../..
      dockerfile: apps/status-gateway/Dockerfile
      args:
        # This host cannot reach proxy.golang.org; default to a reachable mirror.
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      STATUS_STATE_FILE: /data/status-state.json
      PROMETHEUS_URL: http://prometheus:9090
    ports:
      - "${STATUS_GATEWAY_BIND:-127.0.0.1}:18080:8080"
    volumes:
      - status-gateway-data:/data
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/file_sd:/etc/prometheus/file_sd:ro
      - prometheus-data:/prometheus
    depends_on:
      - node-exporter

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    profiles:
      - containers
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - status-gateway

volumes:
  prometheus-data:
    name: realtime-me-prometheus
  status-gateway-data:
    name: realtime-me-status-gateway
