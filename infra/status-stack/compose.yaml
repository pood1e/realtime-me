name: realtime-me-status

services:
  status-gateway:
    build:
      context: ../..
      dockerfile: apps/status-gateway/Dockerfile
      args:
        # This host cannot reach proxy.golang.org; default to a reachable mirror.
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      STATUS_STATE_FILE: /data/status-state.json
      # Both documents are named here, not in .env: they are paths inside this
      # container rather than secrets or host addresses. .env is rewritten whenever
      # a token rotates, and neither line is something you should have to remember
      # to carry across — forgetting one is exactly how the profile went missing.
      PROFILE_CONFIG_FILE: /etc/status-gateway/profile.json
      PROJECTS_CONFIG_FILE: /etc/status-gateway/projects.json
      PROMETHEUS_URL: http://prometheus:9090
    ports:
      - "${STATUS_GATEWAY_BIND:-127.0.0.1}:18080:8080"
    volumes:
      - status-gateway-data:/data
      # The two documents the owner writes by hand: who they are, and which of their
      # repositories the page may show. Everything else a project card carries is
      # read from GitHub at runtime, so these stay small — and they are mounted from
      # the stack directory rather than kept in the data volume, where a `down -v`
      # would take them with it. Copy each from its .example before the first `up`,
      # or Docker will helpfully create a directory in its place and the gateway will
      # report that half the page is unavailable.
      - ./profile.json:/etc/status-gateway/profile.json:ro
      - ./projects.json:/etc/status-gateway/projects.json:ro
    # restart: unless-stopped cannot notice a hung but living process. The
    # healthcheck is what turns "the container is running" into "the container
    # is answering".
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Waiting for the container to start says nothing about whether Prometheus is
    # answering; the gateway's first queries would be refused and retried.
    depends_on:
      prometheus:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.13.0
    restart: unless-stopped
    command:
      # --web.enable-lifecycle is deliberately absent: it serves unauthenticated
      # /-/reload and /-/quit, nothing here reloads Prometheus, and the loopback
      # bind was the only thing standing in front of them.
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/file_sd:/etc/prometheus/file_sd:ro
      # Bearer token Prometheus presents to the gateway's scrape-discovery
      # endpoint. Create it before the first `up`, or Docker will helpfully
      # create a directory here and Prometheus will fail to start.
      - ./prometheus/query_token:/etc/prometheus/query_token:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      node-exporter:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:v1.11.1
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    restart: unless-stopped
    profiles:
      - containers
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:2026.7.0
    restart: unless-stopped
    profiles:
      - tunnel
    # cloudflared reads the token from TUNNEL_TOKEN or from argv, and nothing
    # else. The environment at least keeps it out of `ps` inside the container;
    # it is still readable to anyone who can run `docker inspect` on this host,
    # which is anyone in the docker group.
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      status-gateway:
        condition: service_healthy

volumes:
  prometheus-data:
    name: realtime-me-prometheus
  status-gateway-data:
    name: realtime-me-status-gateway
