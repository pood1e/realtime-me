name: realtime-me-status

services:
  status-gateway:
    build:
      context: ../..
      dockerfile: apps/status-gateway/Dockerfile
      args:
        # This host cannot reach proxy.golang.org; default to a reachable mirror.
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
    restart: unless-stopped
    env_file:
      - .env
    # What the container *is*: its port, where it keeps its state, who its neighbours
    # are. Everything a person *chooses* — tokens, GitHub credentials, the profile —
    # lives in gateway.yaml, mounted below. These paths are named here rather than in
    # .env because .env is rewritten whenever a token rotates, and a config line that
    # quietly leaves with one is exactly how the profile went missing for four days.
    environment:
      PORT: "8080"
      STATUS_STATE_FILE: /data/status-state.json
      STATUS_GATEWAY_CONFIG: /etc/status-gateway/gateway.yaml
      PROJECTS_CONFIG_FILE: /etc/status-gateway/projects.json
      PROMETHEUS_URL: http://prometheus:9090
    ports:
      - "${STATUS_GATEWAY_BIND:-127.0.0.1}:18080:8080"
    volumes:
      - status-gateway-data:/data
      # The two files the owner writes by hand. gateway.yaml is every setting there is:
      # the tokens, the GitHub credentials, the profile. projects.json is data rather
      # than settings — which repositories the page may show, and the summaries GitHub
      # cannot give back — and it is JSON because long prose reads badly in YAML.
      #
      # Both are mounted from this directory rather than kept in the data volume, where
      # a `down -v` would take them with it. Copy each from its .example before the
      # first `up`: Docker will otherwise create a *directory* in place of a missing
      # file, and the gateway will refuse to start on a settings file it cannot read.
      #
      # The gateway runs as appuser (uid 10001), not as you, so a bind-mounted 0600
      # file owned by your account is one it cannot open. Give the files the read bit
      # and take it off the directory instead — the daemon mounts them as root, so the
      # directory's mode never reaches the container, but it is what keeps every other
      # account on the host away from five secrets:
      #   chmod 700 . && chmod 644 gateway.yaml projects.json
      - ./gateway.yaml:/etc/status-gateway/gateway.yaml:ro
      - ./projects.json:/etc/status-gateway/projects.json:ro
    # restart: unless-stopped cannot notice a hung but living process. The
    # healthcheck is what turns "the container is running" into "the container
    # is answering".
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Waiting for the container to start says nothing about whether Prometheus is
    # answering; the gateway's first queries would be refused and retried.
    depends_on:
      prometheus:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.13.0
    restart: unless-stopped
    command:
      # --web.enable-lifecycle is deliberately absent: it serves unauthenticated
      # /-/reload and /-/quit, nothing here reloads Prometheus, and the loopback
      # bind was the only thing standing in front of them.
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
    ports:
      - "127.0.0.1:19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/file_sd:/etc/prometheus/file_sd:ro
      # Bearer token Prometheus presents to the gateway's scrape-discovery
      # endpoint. Create it before the first `up`, or Docker will helpfully
      # create a directory here and Prometheus will fail to start.
      - ./prometheus/query_token:/etc/prometheus/query_token:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      node-exporter:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:v1.11.1
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    restart: unless-stopped
    profiles:
      - containers
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:2026.7.0
    restart: unless-stopped
    profiles:
      - tunnel
    # cloudflared reads the token from TUNNEL_TOKEN or from argv, and nothing
    # else. The environment at least keeps it out of `ps` inside the container;
    # it is still readable to anyone who can run `docker inspect` on this host,
    # which is anyone in the docker group.
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      status-gateway:
        condition: service_healthy

volumes:
  prometheus-data:
    name: realtime-me-prometheus
  status-gateway-data:
    name: realtime-me-status-gateway
