global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "server"

  - job_name: vm-node-exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/vm-node-exporters.yml

  - job_name: cadvisor
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/cadvisor.yml

  - job_name: status-gateway
    static_configs:
      - targets: ["status-gateway:8080"]
        labels:
          instance: "server"
