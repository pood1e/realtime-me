global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "server"
          device_id: "server"
          device_name: "Server"
          device_kind: "host"
          device_role: "server"
    http_sd_configs:
      - url: http://status-gateway:8080/api/prometheus/http-sd/node-exporter
        refresh_interval: 30s

  - job_name: vm-node-exporter
    http_sd_configs:
      - url: http://status-gateway:8080/api/prometheus/http-sd/vm-node-exporter
        refresh_interval: 30s

  - job_name: device-exporter
    http_sd_configs:
      - url: http://status-gateway:8080/api/prometheus/http-sd/device-exporter
        refresh_interval: 30s

  - job_name: cadvisor
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/cadvisor.yml

  - job_name: agent-exporter
    http_sd_configs:
      - url: http://status-gateway:8080/api/prometheus/http-sd/agent-exporter
        refresh_interval: 30s

  - job_name: status-gateway
    static_configs:
      - targets: ["status-gateway:8080"]
        labels:
          instance: "server"
