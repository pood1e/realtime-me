<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <g stroke-linecap="round" stroke-linejoin="round">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 120 80" to="360 120 80" dur="3.4s" repeatCount="indefinite"/>
      <rect x="46" y="72" width="15" height="15" rx="3" stroke="#14B8A6" stroke-width="3"/>
      <rect x="179" y="72" width="15" height="15" rx="3" stroke="#60A5FA" stroke-width="3"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360 120 80" to="0 120 80" dur="2.6s" repeatCount="indefinite"/>
      <rect x="112" y="16" width="13" height="13" rx="3" stroke="#60A5FA" stroke-width="3"/>
      <rect x="112" y="131" width="13" height="13" rx="3" stroke="#14B8A6" stroke-width="3"/>
    </g>
    <g opacity=".85">
      <animateTransform attributeName="transform" type="rotate" from="45 120 80" to="405 120 80" dur="4.6s" repeatCount="indefinite"/>
      <rect x="64" y="34" width="11" height="11" rx="3" stroke="#14B8A6" stroke-width="3"/>
      <rect x="165" y="115" width="11" height="11" rx="3" stroke="#60A5FA" stroke-width="3"/>
    </g>
  </g>
  <circle cx="120" cy="80" r="44" stroke="#14B8A6" stroke-width="2" opacity=".35">
    <animate attributeName="r" values="38;46;38" dur="1.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".45;.08;.45" dur="1.3s" repeatCount="indefinite"/>
  </circle>
  <g>
    <!-- translate then scale, so the core swells about its own centre: with
         transform="translate(t) scale(s)" a point p maps to t + s*p, and
         t = (120(1-s), 80(1-s)) pins (120,80) in place. -->
    <animateTransform attributeName="transform" type="translate" values="0 0;-7.2 -4.8;0 0" additive="sum" dur="1.1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.06;1" additive="sum" dur="1.1s" repeatCount="indefinite"/>
    <circle cx="120" cy="80" r="32" fill="#0F172A" fill-opacity=".72" stroke="#14B8A6" stroke-width="2"/>
    <path d="m104 68 11 12-11 12" stroke="#14B8A6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values=".5;1;.5" dur=".9s" repeatCount="indefinite"/>
    </path>
    <path d="M123 94h23" stroke="#60A5FA" stroke-width="6" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="1 26;22 4;1 26" dur="1.1s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
