name: cloud-drive

x-app-image: &app-image
  build:
    context: .
    dockerfile: services/library/Dockerfile
  image: "${CLOUD_DRIVE_IMAGE:-cloud-drive:local}"

services:
  postgres:
    image: "${POSTGRES_IMAGE:-postgres:18.4-alpine}"
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:?POSTGRES_DB is required}"
      POSTGRES_USER: "${POSTGRES_USER:?POSTGRES_USER is required}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_INITDB_ARGS: "--data-checksums"
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - type: bind
        source: "${CLOUD_DRIVE_POSTGRES_DIR:?CLOUD_DRIVE_POSTGRES_DIR is required}"
        target: /var/lib/postgresql
        bind:
          create_host_path: false
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  migrate:
    <<: *app-image
    command: ["/usr/local/bin/library-migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?sslmode=disable"
      DATA_ROOT: /var/lib/cloud-drive
    volumes:
      - type: bind
        source: "${CLOUD_DRIVE_DATA_DIR:?CLOUD_DRIVE_DATA_DIR is required}"
        target: /var/lib/cloud-drive
        bind:
          create_host_path: false
    networks:
      - backend

  api:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?sslmode=disable"
      DATA_ROOT: /var/lib/cloud-drive
      RESERVED_FREE_BYTES: "${RESERVED_FREE_BYTES:-21474836480}"
      LISTEN_ADDR: ":8080"
      INTERNAL_API_KEY_FILE: /run/secrets/internal_api_key
      MUSIC_PROVIDER_CREDENTIAL_KEY: "${MUSIC_PROVIDER_CREDENTIAL_KEY:?MUSIC_PROVIDER_CREDENTIAL_KEY is required}"
      PUBLIC_SITE_ORIGIN: "${PUBLIC_SITE_ORIGIN:?PUBLIC_SITE_ORIGIN is required}"
      CONSOLE_ORIGIN: "${CONSOLE_ORIGIN:?CONSOLE_ORIGIN is required}"
      OIDC_ISSUER: "${OIDC_ISSUER:?OIDC_ISSUER is required}"
      LIBRARY_AUTH_AUDIENCE: "${LIBRARY_AUTH_AUDIENCE:?LIBRARY_AUTH_AUDIENCE is required}"
      PRIVATE_API_HOST: "${PRIVATE_API_HOST:?PRIVATE_API_HOST is required}"
      PUBLIC_API_HOST: "${PUBLIC_API_HOST:?PUBLIC_API_HOST is required}"
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID:-}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET:-}"
    volumes:
      - type: bind
        source: "${CLOUD_DRIVE_DATA_DIR:?CLOUD_DRIVE_DATA_DIR is required}"
        target: /var/lib/cloud-drive
        bind:
          create_host_path: false
    secrets:
      - internal_api_key
    ports:
      - "${LIBRARY_API_LAN_BIND:?LIBRARY_API_LAN_BIND is required}:18081:8080"
      - "${LIBRARY_API_VPN_BIND:?LIBRARY_API_VPN_BIND is required}:18081:8080"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      backend:
      provider-egress:
        gw_priority: 1

  library-public:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      PUBLIC_API_HOST: "${PUBLIC_API_HOST:?PUBLIC_API_HOST is required}"
    volumes:
      - type: bind
        source: ./services/library/public.Caddyfile
        target: /etc/caddy/Caddyfile
        read_only: true
        bind:
          create_host_path: false
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      backend:
      edge:
        aliases:
          - library-public

  worker:
    <<: *app-image
    command: ["/usr/local/bin/library-worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?sslmode=disable"
      DATA_ROOT: /var/lib/cloud-drive
      MUSIC_PROVIDER_CREDENTIAL_KEY: "${MUSIC_PROVIDER_CREDENTIAL_KEY:?MUSIC_PROVIDER_CREDENTIAL_KEY is required}"
      RESERVED_FREE_BYTES: "${RESERVED_FREE_BYTES:-21474836480}"
      CONSOLE_ORIGIN: "${CONSOLE_ORIGIN:?CONSOLE_ORIGIN is required}"
      SPOTIFY_CLIENT_ID: "${SPOTIFY_CLIENT_ID:-}"
      SPOTIFY_CLIENT_SECRET: "${SPOTIFY_CLIENT_SECRET:-}"
    volumes:
      - type: bind
        source: "${CLOUD_DRIVE_DATA_DIR:?CLOUD_DRIVE_DATA_DIR is required}"
        target: /var/lib/cloud-drive
        bind:
          create_host_path: false
    networks:
      - backend
      - provider-egress

networks:
  backend:
    internal: true
  edge:
    external: true
    name: realtime-me-edge
  provider-egress:

secrets:
  internal_api_key:
    file: "${INTERNAL_API_KEY_FILE:?INTERNAL_API_KEY_FILE is required}"
