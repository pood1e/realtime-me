global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "server"
          device_id: "server"
          device_name: "Server"
          device_kind: "host"
          device_role: "server"

  - job_name: probe-agent
    http_sd_configs:
      - url: http://status-gateway:8080/api/prometheus/http-sd/probe-agent
        refresh_interval: 30s
        authorization:
          type: Bearer
          credentials_file: /etc/prometheus/query_token

  - job_name: cadvisor
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/cadvisor.yml

  - job_name: status-gateway
    static_configs:
      - targets: ["status-gateway:8080"]
        labels:
          instance: "server"
