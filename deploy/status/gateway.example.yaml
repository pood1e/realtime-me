# The status gateway's settings: everything a person chooses, in one file.
#
# Copy to gateway.yaml and fill it in. gateway.yaml is gitignored — it holds every
# secret the gateway has — and is bind-mounted into the container by compose.yaml.
#
# What is *not* here is deliberate. The port, the state-file paths, and the address of
# Prometheus are what the container is, not what you chose, so Compose sets them and
# you never see them. The curated projects are data rather than settings, and long
# prose reads badly in YAML, so they live in projects.json beside this file.
#
# An unknown key here is a startup error, not a setting that quietly does nothing.

tokens:
  # Write. Enrolls devices, accepts the phone's status, registers scrape targets.
  # Only the phone app and scripts/operator/register-device.py present it.
  #   openssl rand -base64 32
  ingest: replace-with-generated-token

  # Read. Reaches the internal dashboard, the metric charts, and scrape discovery —
  # nothing else. It must differ from the ingest token, because this one is pasted
  # into a browser and kept in localStorage. Prometheus presents it too, so write the
  # same value, without a trailing newline, to prometheus/query_token:
  #   printf %s "<the token>" > prometheus/query_token
  query: replace-with-a-second-generated-token

github:
  # Writes the owner's GitHub status — the emoji and message on their profile — through
  # the changeUserStatus mutation. A *classic* token, scope `user`, and nothing more:
  # it has no business reading a repository, and must never be widened to.
  #   https://github.com/settings/tokens/new
  status_token: replace-with-github-user-scope-token
  status_min_interval_seconds: 10
  status_ttl_minutes: 20

  # Reads the repositories projects.json names, and nothing else. Read-only, and never
  # the token above.
  #
  # Plural, because a fine-grained token reaches the repositories of a single user or
  # organization and no further, while your projects may span several owners. Create
  # one per owner at https://github.com/settings/personal-access-tokens/new with:
  #
  #   Resource owner          the account or organization that owns those repositories
  #   Repository access       All repositories
  #   Repository permissions  Metadata: Read-only     ← this one, and nothing else
  #
  # An organization may hold the token pending until an owner approves it, under
  # Settings → Personal access tokens → Pending requests.
  #
  # A classic token is not an option here: it has no read-only grade for private
  # repositories. The only scope that reaches them is `repo`, which is read *and write*
  # over every repository you have — on a host that needs to write to none of them.
  projects_tokens:
    - replace-with-metadata-read-only-token-for-your-account
    - replace-with-metadata-read-only-token-for-an-organization

  # How often to ask GitHub about the curated repositories. Languages, stars, and an
  # archived flag do not move quickly enough to be worth asking more often than this.
  projects_refresh_hours: 24

profile:
  # The topbar's name, the avatar beside it, and the GitHub link are all read from this
  # login. Do not write any of them down: github.com/<login>.png already resolves to
  # your current avatar, so the page follows a change on GitHub with no file to edit.
  github_login: your-login

  # The ways to reach you that GitHub cannot supply. The GitHub link is derived, so it
  # does not belong here. `platform` picks the icon: github, telegram, discord, email,
  # or anything else, which falls back to a globe.
  links:
    - platform: telegram
      label: Telegram
      uri: https://t.me/your-handle
    - platform: email
      label: Email
      uri: mailto:you@example.com
