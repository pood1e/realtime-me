name: realtime-me-edge

services:
  cloudflared:
    image: "${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.7.2}"
    command:
      - tunnel
      - --no-autoupdate
      - --metrics
      - 0.0.0.0:2000
      - run
    environment:
      TUNNEL_TOKEN_FILE: /run/secrets/cloudflare_tunnel_token
    secrets:
      - source: cloudflare_tunnel_token
        target: cloudflare_tunnel_token
        uid: "65532"
        gid: "65532"
        mode: 0o400
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:2000", "ready"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s
    networks:
      - edge

networks:
  edge:
    name: realtime-me-edge

secrets:
  cloudflare_tunnel_token:
    file: "${CLOUDFLARE_TUNNEL_TOKEN_FILE:?CLOUDFLARE_TUNNEL_TOKEN_FILE is required}"
