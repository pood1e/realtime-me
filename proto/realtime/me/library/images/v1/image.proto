syntax = "proto3";

package realtime.me.library.images.v1;

import "google/protobuf/timestamp.proto";
import "realtime/me/library/content/v1/processing.proto";

// Image is one private image asset.
message Image {
  string uid = 1;
  string album_uid = 2;
  string display_name = 3;
  string original_file_name = 4;
  string content_type = 5;
  int64 size_bytes = 6;
  int32 width = 7;
  int32 height = 8;
  string preview_url = 9;
  string original_url = 10;
  realtime.me.library.content.v1.ProcessingStatus processing_status = 11;
  google.protobuf.Timestamp create_time = 12;
  google.protobuf.Timestamp update_time = 13;
  google.protobuf.Timestamp delete_time = 14;
}

// Album is a private single-library image collection.
message ImageAlbum {
  string uid = 1;
  string display_name = 2;
  int32 image_count = 3;
  google.protobuf.Timestamp create_time = 4;
}

// ImageLink is a stable anonymous raw-image link.
message ImageLink {
  string uid = 1;
  string image_uid = 2;
  string public_url = 3;
  google.protobuf.Timestamp create_time = 4;
  google.protobuf.Timestamp revoke_time = 5;
}
