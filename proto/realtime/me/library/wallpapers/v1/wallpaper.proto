syntax = "proto3";

package realtime.me.library.wallpapers.v1;

import "google/protobuf/timestamp.proto";

// WallpaperOrientation identifies the source image geometry.
enum WallpaperOrientation {
  WALLPAPER_ORIENTATION_UNSPECIFIED = 0;
  WALLPAPER_ORIENTATION_LANDSCAPE = 1;
  WALLPAPER_ORIENTATION_PORTRAIT = 2;
  WALLPAPER_ORIENTATION_SQUARE = 3;
}

// WallpaperVariant is one public raster rendition.
message WallpaperVariant {
  int32 width = 1;
  int32 height = 2;
  string url = 3;
}

// Wallpaper is one manually published image asset.
message Wallpaper {
  string uid = 1;
  string image_uid = 2;
  string title = 3;
  repeated string tags = 4;
  WallpaperOrientation orientation = 5;
  int32 width = 6;
  int32 height = 7;
  string dominant_color = 8;
  repeated WallpaperVariant variants = 9;
  string original_url = 10;
  google.protobuf.Timestamp publish_time = 11;
  google.protobuf.Timestamp update_time = 12;
}
