syntax = "proto3";

package realtime.me.library.drive.v1;

import "google/protobuf/timestamp.proto";

// DriveItemKind identifies whether a drive item is a file or directory.
enum DriveItemKind {
  // DRIVE_ITEM_KIND_UNSPECIFIED is not a valid persisted item kind.
  DRIVE_ITEM_KIND_UNSPECIFIED = 0;
  // DRIVE_ITEM_KIND_FILE identifies a file with immutable blob content.
  DRIVE_ITEM_KIND_FILE = 1;
  // DRIVE_ITEM_KIND_DIRECTORY identifies a directory that contains child items.
  DRIVE_ITEM_KIND_DIRECTORY = 2;
}

// DriveItem is a file or directory in the private drive hierarchy.
message DriveItem {
  // uid is the server-assigned opaque identifier.
  string uid = 1;
  // parent_uid identifies the containing directory, or is empty for the root.
  string parent_uid = 2;
  // name is the user-visible basename.
  string name = 3;
  // kind identifies whether this item is a file or directory.
  DriveItemKind kind = 4;
  // size_bytes is the file length and is zero for directories.
  int64 size_bytes = 5;
  // content_type is the MIME type for files when known.
  string content_type = 6;
  // create_time is when the item was created.
  google.protobuf.Timestamp create_time = 7;
  // update_time is when the item metadata was last updated.
  google.protobuf.Timestamp update_time = 8;
  // delete_time is when the item entered the trash, if applicable.
  google.protobuf.Timestamp delete_time = 9;
}
