syntax = "proto3";

package realtime.me.library.music.v1;

import "google/protobuf/timestamp.proto";
import "realtime/me/library/music/v1/playlist.proto";
import "realtime/me/library/music/v1/provider.proto";
import "realtime/me/library/music/v1/track.proto";

// MusicLibraryService manages the owner-controlled local catalog and history.
service MusicLibraryService {
  rpc GetTrack(GetTrackRequest) returns (GetTrackResponse);
  rpc ListTracks(ListTracksRequest) returns (ListTracksResponse);
  rpc ImportTrack(ImportTrackRequest) returns (ImportTrackResponse);
  rpc SetTrackFavorite(SetTrackFavoriteRequest) returns (SetTrackFavoriteResponse);
  rpc DeleteTrack(DeleteTrackRequest) returns (DeleteTrackResponse);
  rpc RestoreTrack(RestoreTrackRequest) returns (RestoreTrackResponse);
  rpc PurgeTrack(PurgeTrackRequest) returns (PurgeTrackResponse);
  rpc EmptyTrackTrash(EmptyTrackTrashRequest) returns (EmptyTrackTrashResponse);
  rpc RetryTrackProcessing(RetryTrackProcessingRequest) returns (RetryTrackProcessingResponse);
  rpc RecordPlayback(RecordPlaybackRequest) returns (RecordPlaybackResponse);
  rpc ListPlaybackHistory(ListPlaybackHistoryRequest) returns (ListPlaybackHistoryResponse);
}

// MusicProviderService manages registered external provider plugins.
service MusicProviderService {
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);
  rpc ListProviderConnections(ListProviderConnectionsRequest) returns (ListProviderConnectionsResponse);
  rpc BeginProviderConnection(BeginProviderConnectionRequest) returns (BeginProviderConnectionResponse);
  rpc GetProviderConnectionAttempt(GetProviderConnectionAttemptRequest) returns (GetProviderConnectionAttemptResponse);
  rpc DisconnectProvider(DisconnectProviderRequest) returns (DisconnectProviderResponse);
  rpc SearchMusic(SearchMusicRequest) returns (SearchMusicResponse);
  rpc ResolvePlayback(ResolvePlaybackRequest) returns (ResolvePlaybackResponse);
  rpc GetProviderLyrics(GetProviderLyricsRequest) returns (GetProviderLyricsResponse);
  rpc GetProviderPlaybackToken(GetProviderPlaybackTokenRequest) returns (GetProviderPlaybackTokenResponse);
}

// MusicPlaylistService manages provider playlist snapshots and local downloads.
service MusicPlaylistService {
  rpc ImportPlaylist(ImportPlaylistRequest) returns (ImportPlaylistResponse);
  rpc GetPlaylistImport(GetPlaylistImportRequest) returns (GetPlaylistImportResponse);
  rpc GetPlaylist(GetPlaylistRequest) returns (GetPlaylistResponse);
  rpc ListPlaylists(ListPlaylistsRequest) returns (ListPlaylistsResponse);
  rpc ListPlaylistTracks(ListPlaylistTracksRequest) returns (ListPlaylistTracksResponse);
  rpc DownloadPlaylist(DownloadPlaylistRequest) returns (DownloadPlaylistResponse);
  rpc DeletePlaylist(DeletePlaylistRequest) returns (DeletePlaylistResponse);
}

message GetTrackRequest {
  string track_uid = 1;
}
message GetTrackResponse {
  Track track = 1;
}
message ListTracksRequest {
  string query = 1;
  string album = 2;
  string artist = 3;
  bool favorites = 4;
  bool trashed = 5;
  int32 page_size = 6;
  string page_token = 7;
}
message ListTracksResponse {
  repeated Track tracks = 1;
  string next_page_token = 2;
}
message ImportTrackRequest {
  string upload_uid = 1;
}
message ImportTrackResponse {
  Track track = 1;
}
message SetTrackFavoriteRequest {
  string track_uid = 1;
  bool favorite = 2;
}
message SetTrackFavoriteResponse {
  Track track = 1;
}
message DeleteTrackRequest {
  string track_uid = 1;
}
message DeleteTrackResponse {
  Track track = 1;
}
message RestoreTrackRequest {
  string track_uid = 1;
}
message RestoreTrackResponse {
  Track track = 1;
}
message PurgeTrackRequest {
  string track_uid = 1;
}
message PurgeTrackResponse {}
message EmptyTrackTrashRequest {}
message EmptyTrackTrashResponse {}
message RetryTrackProcessingRequest {
  string track_uid = 1;
}
message RetryTrackProcessingResponse {
  Track track = 1;
}
message ListProvidersRequest {}
message ListProvidersResponse {
  repeated ProviderDescriptor providers = 1;
}
message ListProviderConnectionsRequest {}
message ListProviderConnectionsResponse {
  repeated ProviderConnection connections = 1;
}
message BeginProviderConnectionRequest {
  string provider_id = 1;
}
message BeginProviderConnectionResponse {
  ProviderConnectionAttempt attempt = 1;
}
message GetProviderConnectionAttemptRequest {
  string attempt_uid = 1;
}
message GetProviderConnectionAttemptResponse {
  ProviderConnectionAttempt attempt = 1;
}
message DisconnectProviderRequest {
  string provider_id = 1;
}
message DisconnectProviderResponse {}
message SearchMusicRequest {
  string query = 1;
  repeated ProviderSearchCursor cursors = 2;
}
message SearchMusicResponse {
  repeated ProviderSearchGroup groups = 1;
}
message ResolvePlaybackRequest {
  string provider_id = 1;
  string track_id = 2;
  PlaybackQuality quality = 3;
}
message ResolvePlaybackResponse {
  PlaybackDescriptor playback = 1;
}
message GetProviderLyricsRequest {
  string provider_id = 1;
  string track_id = 2;
}
message GetProviderLyricsResponse {
  Lyric lyric = 1;
}
message GetProviderPlaybackTokenRequest {
  string provider_id = 1;
}
message GetProviderPlaybackTokenResponse {
  string access_token = 1;
  google.protobuf.Timestamp expire_time = 2;
}
message RecordPlaybackRequest {
  PlayableTrack track = 1;
}
message RecordPlaybackResponse {
  PlaybackEntry playback_entry = 1;
}
message ListPlaybackHistoryRequest {
  int32 page_size = 1;
  string page_token = 2;
}
message ListPlaybackHistoryResponse {
  repeated PlaybackEntry playback_entries = 1;
  string next_page_token = 2;
}
message ImportPlaylistRequest {
  string provider_id = 1;
  string source = 2;
}
message ImportPlaylistResponse {
  PlaylistImport playlist_import = 1;
}
message GetPlaylistImportRequest {
  string playlist_import_uid = 1;
}
message GetPlaylistImportResponse {
  PlaylistImport playlist_import = 1;
}
message GetPlaylistRequest {
  string playlist_uid = 1;
}
message GetPlaylistResponse {
  Playlist playlist = 1;
}
message ListPlaylistsRequest {
  int32 page_size = 1;
  string page_token = 2;
}
message ListPlaylistsResponse {
  repeated Playlist playlists = 1;
  string next_page_token = 2;
}
message ListPlaylistTracksRequest {
  string playlist_uid = 1;
  int32 page_size = 2;
  string page_token = 3;
}
message ListPlaylistTracksResponse {
  repeated PlaylistTrack playlist_tracks = 1;
  string next_page_token = 2;
}
message DownloadPlaylistRequest {
  string playlist_uid = 1;
}
message DownloadPlaylistResponse {
  Playlist playlist = 1;
}
message DeletePlaylistRequest {
  string playlist_uid = 1;
}
message DeletePlaylistResponse {}
