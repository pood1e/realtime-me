version: v2
clean: true
plugins:
  - remote: buf.build/bufbuild/es:v2.12.1
    out: server/src/gen
    opt:
      - target=ts
      - import_extension=js
    include_imports: true
  - remote: buf.build/connectrpc/dart:v1.0.0
    out: app/lib/gen
  - remote: buf.build/protocolbuffers/dart:v25.0.0
    out: app/lib/gen
    include_wkt: true
    include_imports: true
inputs:
  - directory: proto
