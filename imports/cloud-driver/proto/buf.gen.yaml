version: v2
plugins:
  - local: protoc-gen-go
    out: ../api/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: ../api/gen
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/es:v2.12.1
    out: ../web/packages/contracts/src/gen
    opt:
      - target=ts
      - import_extension=js
