syntax = "proto3";

package cloud.drive.v1;

import "cloud/drive/v1/item.proto";

option go_package = "example.com/cloud-drive/api/gen/cloud/drive/v1;drivev1";

// DriveService manages the private drive hierarchy and private downloads.
service DriveService {
  // GetDriveItem gets one private item by opaque identifier.
  rpc GetDriveItem(GetDriveItemRequest) returns (GetDriveItemResponse);
  // ListDriveItems lists direct children of a directory.
  rpc ListDriveItems(ListDriveItemsRequest) returns (ListDriveItemsResponse);
  // ListTrashedItems lists top-level roots currently in the trash.
  rpc ListTrashedItems(ListTrashedItemsRequest) returns (ListTrashedItemsResponse);
  // SearchDriveItems searches non-deleted items by basename.
  rpc SearchDriveItems(SearchDriveItemsRequest) returns (SearchDriveItemsResponse);
  // CreateDirectory creates a directory below a parent directory or the root.
  rpc CreateDirectory(CreateDirectoryRequest) returns (CreateDirectoryResponse);
  // RenameDriveItem changes an item's basename.
  rpc RenameDriveItem(RenameDriveItemRequest) returns (RenameDriveItemResponse);
  // MoveDriveItem moves an item to a directory or the root.
  rpc MoveDriveItem(MoveDriveItemRequest) returns (MoveDriveItemResponse);
  // DeleteDriveItem moves an item and any descendants to the trash.
  rpc DeleteDriveItem(DeleteDriveItemRequest) returns (DeleteDriveItemResponse);
  // RestoreDriveItem restores an item and any descendants from the trash.
  rpc RestoreDriveItem(RestoreDriveItemRequest) returns (RestoreDriveItemResponse);
  // PurgeDriveItem permanently deletes a trashed item and any descendants.
  rpc PurgeDriveItem(PurgeDriveItemRequest) returns (PurgeDriveItemResponse);
  // EmptyTrash permanently deletes every trashed item.
  rpc EmptyTrash(EmptyTrashRequest) returns (EmptyTrashResponse);
  // GetDownload returns the authenticated raw-download URL for an item.
  rpc GetDownload(GetDownloadRequest) returns (GetDownloadResponse);
}

// GetDriveItemRequest identifies an item to retrieve.
message GetDriveItemRequest {
  // item_uid is the opaque item identifier.
  string item_uid = 1;
}

// GetDriveItemResponse returns the requested item.
message GetDriveItemResponse {
  // item is the requested drive item.
  DriveItem item = 1;
}

// ListDriveItemsRequest selects a directory's direct children.
message ListDriveItemsRequest {
  // parent_uid identifies the directory, or is empty for the root.
  string parent_uid = 1;
  // include_trashed includes direct children currently in the trash.
  bool include_trashed = 2;
  // page_size limits returned items and defaults to a server-selected value.
  int32 page_size = 3;
  // page_token resumes a previous list request.
  string page_token = 4;
}

// ListDriveItemsResponse contains one page of direct children.
message ListDriveItemsResponse {
  // items contains the returned direct children.
  repeated DriveItem items = 1;
  // next_page_token continues the list when non-empty.
  string next_page_token = 2;
}

// ListTrashedItemsRequest selects top-level trash roots.
message ListTrashedItemsRequest {
  // page_size limits returned items and defaults to a server-selected value.
  int32 page_size = 1;
  // page_token resumes a previous trash list request.
  string page_token = 2;
}

// ListTrashedItemsResponse contains one page of trashed roots.
message ListTrashedItemsResponse {
  // items contains trashed roots whose parents are not also trashed.
  repeated DriveItem items = 1;
  // next_page_token continues the list when non-empty.
  string next_page_token = 2;
}

// SearchDriveItemsRequest searches visible item basenames.
message SearchDriveItemsRequest {
  // query is a case-insensitive basename substring.
  string query = 1;
  // page_size limits returned items and defaults to a server-selected value.
  int32 page_size = 2;
  // page_token resumes a previous search request.
  string page_token = 3;
}

// SearchDriveItemsResponse contains one page of search results.
message SearchDriveItemsResponse {
  // items contains matching non-deleted items.
  repeated DriveItem items = 1;
  // next_page_token continues the search when non-empty.
  string next_page_token = 2;
}

// CreateDirectoryRequest describes a new directory.
message CreateDirectoryRequest {
  // parent_uid identifies the containing directory, or is empty for the root.
  string parent_uid = 1;
  // name is the new directory basename.
  string name = 2;
}

// CreateDirectoryResponse returns the created directory.
message CreateDirectoryResponse {
  // item is the created directory.
  DriveItem item = 1;
}

// RenameDriveItemRequest describes a basename update.
message RenameDriveItemRequest {
  // item_uid identifies the item to rename.
  string item_uid = 1;
  // name is the replacement basename.
  string name = 2;
}

// RenameDriveItemResponse returns the renamed item.
message RenameDriveItemResponse {
  // item is the renamed item.
  DriveItem item = 1;
}

// MoveDriveItemRequest describes a hierarchy move.
message MoveDriveItemRequest {
  // item_uid identifies the item to move.
  string item_uid = 1;
  // parent_uid identifies the destination directory, or is empty for the root.
  string parent_uid = 2;
}

// MoveDriveItemResponse returns the moved item.
message MoveDriveItemResponse {
  // item is the moved item.
  DriveItem item = 1;
}

// DeleteDriveItemRequest identifies an item to place in the trash.
message DeleteDriveItemRequest {
  // item_uid identifies the root item to delete.
  string item_uid = 1;
}

// DeleteDriveItemResponse returns the trashed root item.
message DeleteDriveItemResponse {
  // item is the root item after deletion.
  DriveItem item = 1;
}

// RestoreDriveItemRequest identifies an item to restore from the trash.
message RestoreDriveItemRequest {
  // item_uid identifies the root item to restore.
  string item_uid = 1;
}

// RestoreDriveItemResponse returns the restored root item.
message RestoreDriveItemResponse {
  // item is the restored root item.
  DriveItem item = 1;
}

// PurgeDriveItemRequest identifies a trashed item to delete permanently.
message PurgeDriveItemRequest {
  // item_uid identifies the trashed root item.
  string item_uid = 1;
}

// PurgeDriveItemResponse confirms that the item hierarchy was deleted permanently.
message PurgeDriveItemResponse {}

// EmptyTrashRequest requests permanent deletion of every trashed item.
message EmptyTrashRequest {}

// EmptyTrashResponse confirms that the trash was emptied.
message EmptyTrashResponse {}

// GetDownloadRequest identifies a private file to download.
message GetDownloadRequest {
  // item_uid identifies the file to download.
  string item_uid = 1;
}

// GetDownloadResponse returns metadata and a relative raw-download URL.
message GetDownloadResponse {
  // item is the downloadable file.
  DriveItem item = 1;
  // download_url is the relative authenticated raw-download URL.
  string download_url = 2;
}
