syntax = "proto3";

package cloud.drive.v1;

option go_package = "example.com/cloud-drive/api/gen/cloud/drive/v1;drivev1";

// HealthService reports whether the API can serve requests.
service HealthService {
  // Check reports the service's current health.
  rpc Check(CheckRequest) returns (CheckResponse);
}

// CheckRequest asks for the service health state.
message CheckRequest {}

// CheckResponse reports service readiness.
message CheckResponse {
  // healthy is true when required dependencies are reachable.
  bool healthy = 1;
}
