syntax = "proto3";

package cloud.wallpapers.v1;

import "cloud/wallpapers/v1/wallpaper.proto";

option go_package = "example.com/cloud-drive/api/gen/cloud/wallpapers/v1;wallpapersv1";

// WallpaperAdminService manages manual publication from the private image application.
service WallpaperAdminService {
  rpc ListPublishedWallpapers(ListPublishedWallpapersRequest) returns (ListPublishedWallpapersResponse);
  rpc PublishWallpaper(PublishWallpaperRequest) returns (PublishWallpaperResponse);
  rpc UpdateWallpaper(UpdateWallpaperRequest) returns (UpdateWallpaperResponse);
  rpc UnpublishWallpaper(UnpublishWallpaperRequest) returns (UnpublishWallpaperResponse);
}

// WallpaperPublicService exposes the anonymous read-only wallpaper catalog.
service WallpaperPublicService {
  rpc GetWallpaper(GetWallpaperRequest) returns (GetWallpaperResponse);
  rpc ListWallpapers(ListWallpapersRequest) returns (ListWallpapersResponse);
}

message GetWallpaperRequest { string wallpaper_uid = 1; }
message GetWallpaperResponse { Wallpaper wallpaper = 1; }
message ListPublishedWallpapersRequest {
  string query = 1;
  string tag = 2;
  WallpaperOrientation orientation = 3;
  int32 page_size = 4;
  string page_token = 5;
}
message ListPublishedWallpapersResponse {
  repeated Wallpaper wallpapers = 1;
  string next_page_token = 2;
}
message ListWallpapersRequest {
  string query = 1;
  string tag = 2;
  WallpaperOrientation orientation = 3;
  int32 page_size = 4;
  string page_token = 5;
}
message ListWallpapersResponse {
  repeated Wallpaper wallpapers = 1;
  string next_page_token = 2;
}
message PublishWallpaperRequest {
  string image_uid = 1;
  string title = 2;
  repeated string tags = 3;
}
message PublishWallpaperResponse { Wallpaper wallpaper = 1; }
message UpdateWallpaperRequest {
  string wallpaper_uid = 1;
  string title = 2;
  repeated string tags = 3;
}
message UpdateWallpaperResponse { Wallpaper wallpaper = 1; }
message UnpublishWallpaperRequest { string wallpaper_uid = 1; }
message UnpublishWallpaperResponse {}
