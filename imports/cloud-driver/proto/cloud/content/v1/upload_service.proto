syntax = "proto3";

package cloud.content.v1;

import "cloud/content/v1/upload.proto";

option go_package = "example.com/cloud-drive/api/gen/cloud/content/v1;contentv1";

// ContentUploadService manages application-neutral resumable uploads.
service ContentUploadService {
  // StartUpload creates an active upload session.
  rpc StartUpload(StartUploadRequest) returns (StartUploadResponse);
  // GetUpload returns upload state and acknowledged ranges.
  rpc GetUpload(GetUploadRequest) returns (GetUploadResponse);
  // WriteUploadChunk writes one bounded chunk for Connect clients.
  rpc WriteUploadChunk(WriteUploadChunkRequest) returns (WriteUploadChunkResponse);
  // AbandonUpload removes an unclaimed upload.
  rpc AbandonUpload(AbandonUploadRequest) returns (AbandonUploadResponse);
}

// StartUploadRequest describes a browser-selected file.
message StartUploadRequest {
  // file_name is the original basename.
  string file_name = 1;
  // content_type is a media type hint and is not trusted for authorization.
  string content_type = 2;
  // total_size_bytes is the exact expected size.
  int64 total_size_bytes = 3;
}

// StartUploadResponse returns the active upload and raw chunk endpoint.
message StartUploadResponse {
  // upload is the created session.
  Upload upload = 1;
  // chunk_url is the relative raw-byte endpoint.
  string chunk_url = 2;
}

// GetUploadRequest identifies an upload session.
message GetUploadRequest {
  // upload_uid is the opaque upload identifier.
  string upload_uid = 1;
}

// GetUploadResponse returns current upload state.
message GetUploadResponse {
  // upload is the current session.
  Upload upload = 1;
}

// WriteUploadChunkRequest carries a byte range for Connect clients.
message WriteUploadChunkRequest {
  // upload_uid identifies the upload.
  string upload_uid = 1;
  // start_offset is the first included byte offset.
  int64 start_offset = 2;
  // total_size_bytes repeats the complete length.
  int64 total_size_bytes = 3;
  // data contains the raw chunk bytes.
  bytes data = 4;
}

// WriteUploadChunkResponse returns the updated upload.
message WriteUploadChunkResponse {
  // upload is the session after acknowledgement.
  Upload upload = 1;
}

// AbandonUploadRequest identifies an active upload to remove.
message AbandonUploadRequest {
  // upload_uid identifies the upload.
  string upload_uid = 1;
}

// AbandonUploadResponse confirms removal.
message AbandonUploadResponse {}
