version: v2
clean: true
plugins:
  - local: tools/protoc-gen-es
    out: packages/status-contracts-web/src/gen
    opt:
      - target=ts
      - json_types=true
      - import_extension=js
  - local: tools/protoc-gen-dart
    out: packages/status-contracts-dart/lib/gen
    include_imports: true
    include_wkt: true
