version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/pood1e/realtime-me/services/status/internal/genproto
plugins:
  - local: protoc-gen-go
    out: services/status/internal/genproto
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: services/status/internal/genproto
    opt: paths=source_relative
  - local: node_modules/.bin/protoc-gen-es
    out: apps/web/status/src/gen
    opt:
      - target=ts
      - json_types=true
